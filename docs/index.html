<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>⌘英かな</title>
  <meta name="description" content="左右のコマンドキーで英数/かなを切り替える macOS アプリ">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f8f8;
      --fg: #171a1c;
      --muted: #5d6670;
      --panel: #ffffff;
      --border: #d9dedf;
      --accent: #147d73;
      --accent-pressed: #0f635b;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111416;
        --fg: #f3f5f5;
        --muted: #aab2b8;
        --panel: #1b2023;
        --border: #30383c;
        --accent: #42b8a9;
        --accent-pressed: #63cbbf;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      line-height: 1.6;
    }

    .page {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 64px 0 48px;
    }

    .hero {
      display: grid;
      grid-template-columns: 128px minmax(0, 1fr);
      gap: 28px;
      align-items: center;
      padding-bottom: 40px;
      border-bottom: 1px solid var(--border);
    }

    .app-icon {
      width: 128px;
      height: 128px;
      border-radius: 28px;
      box-shadow: 0 18px 40px rgb(0 0 0 / 18%);
    }

    h1 {
      margin: 0;
      font-size: 44px;
      line-height: 1.12;
      font-weight: 700;
    }

    .lead {
      max-width: 680px;
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 18px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    a {
      color: var(--accent);
    }

    .button {
      display: inline-flex;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      text-decoration: none;
    }

    .button:hover {
      background: var(--accent-pressed);
    }

    .secondary {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
    }

    .secondary:hover {
      background: var(--panel);
    }

    .details {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 32px;
    }

    .detail {
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
    }

    h2 {
      margin: 0 0 8px;
      font-size: 16px;
      line-height: 1.35;
    }

    p {
      margin: 0;
    }

    .small {
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 680px) {
      .page {
        width: min(100% - 24px, 920px);
        padding-top: 32px;
      }

      .hero,
      .details {
        grid-template-columns: 1fr;
      }

      .app-icon {
        width: 96px;
        height: 96px;
        border-radius: 22px;
      }

      h1 {
        font-size: 36px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <img class="app-icon" src="./assets/icon_256x256.png" alt="⌘英かな app icon" width="128" height="128">
      <div>
        <h1>⌘英かな</h1>
        <p class="lead">左右のコマンドキーを単体で押した時に、英数/かなを切り替える macOS アプリです。</p>
        <div class="actions">
          <a class="button" href="https://github.com/shierote/cmd-eikana-apple-silicon/releases/latest">Download</a>
          <a class="button secondary" href="https://github.com/shierote/cmd-eikana-apple-silicon">GitHub</a>
        </div>
      </div>
    </div>

    <div class="details">
      <div class="detail">
        <h2>Apple Silicon / Intel</h2>
        <p class="small">Release archives are configured as Universal 2 binaries.</p>
      </div>
      <div class="detail">
        <h2>初回起動</h2>
        <p class="small">未署名アプリのため、右クリックから開いてアクセシビリティ権限を許可してください。</p>
      </div>
      <div class="detail">
        <h2>更新チェック</h2>
        <p class="small"><code>update.json</code> is served from this GitHub Pages site.</p>
      </div>
    </div>
  </div>
</body>
</html>
